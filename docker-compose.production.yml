services:
  api:
    build:
      context: ./backend
    container_name: genchats-v2-api
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "4002:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: genchats-v2-frontend
    restart: unless-stopped
    env_file:
      - ./.env.production
    ports:
      - "8082:80"
    depends_on:
      - api
